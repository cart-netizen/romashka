# Прод-стек: Postgres + Directus + Next.js (web) + Nginx (reverse proxy + SSL).
# Запуск на VPS (РФ): cd deploy && cp .env.example .env && заполнить → docker compose -f docker-compose.prod.yml up -d --build
# Postgres наружу НЕ публикуется. Web/Directus доступны только через Nginx.

services:
  database:
    image: postgis/postgis:16-3.4-alpine
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    healthcheck:
      test: ["CMD", "pg_isready", "--host=localhost", "--username=${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  directus:
    image: directus/directus:11
    restart: always
    volumes:
      - ./directus/uploads:/directus/uploads
      - ./directus/extensions:/directus/extensions
      - ./directus/snapshot:/directus/snapshot
    depends_on:
      database:
        condition: service_healthy
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL}
      WEBSOCKETS_ENABLED: "true"
      # CORS — только основной домен
      CORS_ENABLED: "true"
      CORS_ORIGIN: ${SITE_URL}

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${SITE_URL}
        NEXT_PUBLIC_DIRECTUS_URL: ${DIRECTUS_PUBLIC_URL}
        NEXT_PUBLIC_YANDEX_METRICA_ID: ${NEXT_PUBLIC_YANDEX_METRICA_ID}
    restart: always
    depends_on:
      - directus
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${SITE_URL}
      DIRECTUS_URL: http://directus:8055
      NEXT_PUBLIC_DIRECTUS_URL: ${DIRECTUS_PUBLIC_URL}
      DIRECTUS_ADMIN_TOKEN: ${DIRECTUS_ADMIN_TOKEN}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      MAX_ADMIN_CHAT_ID: ${MAX_ADMIN_CHAT_ID}
      MAX_API_BASE: ${MAX_API_BASE}
      MAX_NOTIFY_TOKEN: ${MAX_NOTIFY_TOKEN}
      MAX_NOTIFY_SENDER: ${MAX_NOTIFY_SENDER}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      LEAD_EMAIL_TO: ${LEAD_EMAIL_TO}
      NEXT_PUBLIC_YANDEX_METRICA_ID: ${NEXT_PUBLIC_YANDEX_METRICA_ID}
      YANDEX_WEBMASTER_VERIFICATION: ${YANDEX_WEBMASTER_VERIFICATION}

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - web
      - directus

volumes:
  db_data:
