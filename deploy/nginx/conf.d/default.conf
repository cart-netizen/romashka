# Nginx reverse proxy для прод-стека «Ромашка».
# ЗАМЕНИТЕ paleron.ru / cms.paleron.ru на ваш домен.
# SSL-сертификаты выпускаются certbot (см. deploy/README — раздел SSL).

# Общие настройки сжатия и заголовков
map $sent_http_content_type $cacheable {
    default                    "no-cache";
    "~image/"                  "public, max-age=2592000, immutable";
    "~font/"                   "public, max-age=2592000, immutable";
    "application/javascript"   "public, max-age=2592000, immutable";
    "text/css"                 "public, max-age=2592000, immutable";
}

# --- HTTP: ACME-челлендж + редирект на HTTPS ---
server {
    listen 80;
    server_name paleron.ru www.paleron.ru cms.paleron.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: основной сайт (Next.js) ---
server {
    listen 443 ssl;
    http2 on;
    server_name paleron.ru www.paleron.ru;

    ssl_certificate     /etc/letsencrypt/live/paleron.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paleron.ru/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 25m;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- HTTPS: Directus (CMS/API/ассеты) ---
server {
    listen 443 ssl;
    http2 on;
    server_name cms.paleron.ru;

    ssl_certificate     /etc/letsencrypt/live/paleron.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paleron.ru/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 100m; # загрузка файлов в админке

    location / {
        proxy_pass http://directus:8055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
